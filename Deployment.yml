apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat-deployment
  labels:
    app: ai-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-chat
  template:
    metadata:
      labels:
        app: ai-chat
    spec:
      containers:
        - name: ai-app
          image: replace
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-chat-service
spec:
  type: LoadBalancer
  selector:
    app: ai-chat
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP